name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: sh build.sh

      - name: Zip app
        run: ditto -c -k --keepParent "Just Text.app" "JustText.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JustText
          path: JustText.zip

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: JustText.zip
