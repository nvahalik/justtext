name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build app
        run: sh build.sh

      # --- Signing + notarization (tagged releases only) ---
      - name: Import signing certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT="$(mktemp)"
          KC="$RUNNER_TEMP/build.keychain"
          KC_PWD="$(uuidgen)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT"
          security create-keychain -p "$KC_PWD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PWD" "$KC"
          security import "$CERT" -k "$KC" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PWD" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT"

      - name: Sign, notarize, staple
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "$SIGN_IDENTITY" "Just Text.app"
          codesign --verify --strict --verbose=2 "Just Text.app"
          ditto -c -k --keepParent "Just Text.app" "notarize.zip"
          xcrun notarytool submit "notarize.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PWD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "Just Text.app"

      - name: Zip app
        run: ditto -c -k --keepParent "Just Text.app" "JustText.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: JustText
          path: JustText.zip

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: JustText.zip
